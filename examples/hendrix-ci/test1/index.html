    <script>
      async function run() {
        const out = document.getElementById("out");

        window.addEventListener("error", (e) => {
          console.error("WINDOW_ERROR", e.message);
        });

        window.addEventListener("unhandledrejection", (e) => {
          console.error("UNHANDLED_REJECTION", String(e.reason));
        });

        console.log("crossOriginIsolated =", crossOriginIsolated);
        console.log("navigator.gpu =", typeof navigator.gpu);
        console.log("userAgent =", navigator.userAgent);

        if (!crossOriginIsolated) {
          out.textContent = "FAIL: crossOriginIsolated is false (COOP/COEP headers missing).";
          throw new Error("crossOriginIsolated is false");
        }

        if (!navigator.gpu) {
          out.textContent = "FAIL: navigator.gpu missing";
          throw new Error("navigator.gpu missing");
        }

        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) {
          out.textContent = "FAIL: requestAdapter returned null";
          throw new Error("requestAdapter returned null");
        }

        const features = [...adapter.features].sort();
        console.log("adapter.features =", JSON.stringify(features));
        console.log("adapter has shader-f16 =", adapter.features.has("shader-f16"));

        console.log("typeof Module =", typeof Module);
        console.log("typeof FutharkModule =", typeof FutharkModule);

        if (typeof Module !== "function") {
          throw new Error("Module() not found. test1.js may not have loaded or is not a classic script.");
        }
        if (typeof FutharkModule !== "function") {
          throw new Error("FutharkModule not found. test1.wrapper.js may not have loaded.");
        }

        const m = await Module();
        const fut = new FutharkModule();
        await fut.init(m);

        const n = 50000;
        const expected = (n * (n + 1)) / 2;

        const [r] = await fut.entry.main(n);

        console.log("computed result =", r);
        console.log("expected result =", expected);

        if (Number(r) !== expected) {
          throw new Error("Wrong result: " + r + " (expected " + expected + ")");
        }

        console.log("FUTHARK_WEBGPU_TEST1_OK");
        out.textContent = "OK";
      }

      window.addEventListener("load", () => {
        run().catch((e) => {
          console.error("FUTHARK_WEBGPU_TEST1_FAIL", e);
          const out = document.getElementById("out");
          if (out) out.textContent = "FAIL: " + e;
        });
      });
    </script>
  </body>
</html>
